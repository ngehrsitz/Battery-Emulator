name: ⚖️ Measure firmware size

# Reusable workflow called by "🔋 Compile Common Images" on pull_request.
# The caller already knows the PR number and base ref/sha, so it passes them in
# as inputs — no PR lookup here (looking a fork PR up from the base repo is
# unreliable: the head commit isn't reachable from any base-repo ref).
#
# No PlatformIO, no rebuilds — just download the per-board size reports the
# caller's build matrix produced, diff against the base branch, and render a
# comment. Posting the comment happens later in add-comment-to-pr.yml, which
# runs as a separate workflow_run event so it can hold a pull-requests:write
# token even for fork PRs. This job only ever needs read access.

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Number of the PR being measured."
        required: true
        type: string
      base_ref:
        description: "Base branch the PR targets (e.g. main)."
        required: true
        type: string
      base_sha:
        description: "Base branch tip SHA, for the comment header."
        required: true
        type: string

permissions:
  actions: read       # list workflow runs; cross-run artifact download of base
  contents: read

jobs:
  measure:
    runs-on: ubuntu-latest
    steps:
    - name: Check PR context
      if: inputs.pr_number == '' || inputs.base_ref == ''
      run: |
        echo "::error::measure was called without a PR number / base ref." >&2
        exit 1

    - name: Checkout scripts
      uses: actions/checkout@v7
      with:
        sparse-checkout: .github/scripts

    - name: Download PR-side size reports from this run
      uses: actions/download-artifact@v8
      with:
        path: ./pr
        pattern: "battery-emulator-*"
        merge-multiple: true

    - name: Resolve base compile run
      id: ctx
      uses: actions/github-script@v9
      with:
        script: |
          const { owner, repo } = context.repo;

          // Most recent successful push-triggered compile run on the PR's base
          // branch — this is the baseline we diff against. Queries the base
          // repo's own push runs, so it's unaffected by fork PRs.
          const { data: runs } = await github.rest.actions.listWorkflowRuns({
            owner, repo,
            workflow_id: 'compile-common-image.yml',
            branch: '${{ inputs.base_ref }}',
            event: 'push',
            status: 'success',
            per_page: 1,
          });

          core.setOutput('run_id', runs.workflow_runs[0]?.id ?? '');

    - name: Download base-branch artifacts
      if: steps.ctx.outputs.run_id != ''
      uses: actions/download-artifact@v8
      with:
        path: ./base
        run-id: ${{ steps.ctx.outputs.run_id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        pattern: "battery-emulator-*"
        merge-multiple: true

    - name: Render comment
      run: |
        python .github/scripts/render_size_comment.py \
          --pr-dir ./pr \
          --base-dir ./base \
          --base-branch "${{ inputs.base_ref }}" \
          --base-sha    "${{ inputs.base_sha }}" \
          --head-sha    "${{ github.event.pull_request.head.sha }}" \
          > comment.md
        echo "${{ inputs.pr_number }}" > pr_number.txt

    - name: Upload firmware size report
      uses: actions/upload-artifact@v7
      with:
        name: comment-for-pr
        if-no-files-found: error
        path: |
          comment.md
          pr_number.txt

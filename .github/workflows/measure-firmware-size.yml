name: ⚖️ Measure firmware size

# Runs as a consumer of the compile workflow's per-board size sidecars
# (${{ matrix.pio_env }}.size.json inside each per-board artifact).
# No PlatformIO, no rebuilds — just download, diff, and comment.

on:
  workflow_run:
    workflows: ["🔋 Compile Common Images"]
    types: [completed]

permissions:
  actions: read       # list workflow runs; cross-run artifact download
  contents: read

jobs:
  measure:
    # Only when the triggering compile run was itself started by a PR,
    # and it didn't get cancelled outright. Individual board failures
    # are tolerated — the render script handles missing sidecars.
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout scripts
      uses: actions/checkout@v7
      with:
        sparse-checkout: .github/scripts

    - name: Download PR-side artifacts from triggering run
      uses: actions/download-artifact@v4
      with:
        path: ./pr
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        pattern: "*.bin"
        merge-multiple: true

    - name: Resolve PR context (number, base branch, base SHA)
      id: prctx
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      run: |
        # commits/{sha}/pulls works for fork PRs where workflow_run.pull_requests is empty.
        PR_JSON=$(gh api "repos/${{ github.repository }}/commits/${HEAD_SHA}/pulls" \
                    -H "Accept: application/vnd.github+json")
        PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number // empty')
        BASE_BRANCH=$(echo "$PR_JSON" | jq -r '.[0].base.ref // empty')
        BASE_SHA=$(echo "$PR_JSON" | jq -r '.[0].base.sha // empty')
        if [ -z "$PR_NUMBER" ]; then
          echo "No open PR found for head SHA $HEAD_SHA; nothing to comment on."
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
        fi

    - name: Resolve latest successful base-branch compile run
      id: baserun
      if: steps.prctx.outputs.skip != 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BASE_BRANCH: ${{ steps.prctx.outputs.base_branch }}
      run: |
        RUN_ID=$(gh api \
          "repos/${{ github.repository }}/actions/workflows/compile-common-image.yml/runs?branch=${BASE_BRANCH}&status=success&event=push&per_page=1" \
          --jq '.workflow_runs[0].id // empty')
        echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
        if [ -z "$RUN_ID" ]; then
          echo "no_baseline=true" >> "$GITHUB_OUTPUT"
        else
          echo "no_baseline=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Download base-branch artifacts
      if: steps.prctx.outputs.skip != 'true' && steps.baserun.outputs.no_baseline == 'false'
      uses: actions/download-artifact@v4
      with:
        path: ./base
        run-id: ${{ steps.baserun.outputs.run_id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        pattern: "*.bin"
        merge-multiple: true

    - name: Render comment
      if: steps.prctx.outputs.skip != 'true'
      run: |
        python .github/scripts/render_size_comment.py \
          --pr-dir ./pr \
          --base-dir ./base \
          --base-branch "${{ steps.prctx.outputs.base_branch }}" \
          --base-sha    "${{ steps.prctx.outputs.base_sha }}" \
          --head-sha    "${{ github.event.workflow_run.head_sha }}" \
          --no-baseline "${{ steps.baserun.outputs.no_baseline }}" \
          --out comment.md
        echo "${{ steps.prctx.outputs.pr_number }}" > pr_number.txt

    - name: Upload firmware size report
      if: steps.prctx.outputs.skip != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: comment-for-pr
        path: |
          comment.md
          pr_number.txt
        if-no-files-found: error

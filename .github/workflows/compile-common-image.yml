name: 🔋 Compile Common Images

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

# This is the list of jobs that will be run concurrently.
jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - board_name: "LilygoT-CAN485"
            pio_env: "lilygo_330"
            artifact_name: "battery-emulator-lilygo-t-can485"
            release_label: "LilygoT-CAN485"
          - board_name: "Stark CMR"
            pio_env: "stark_330"
            artifact_name: "battery-emulator-stark"
            release_label: "StarkCMR"
          - board_name: "LilygoT-2CAN"
            pio_env: "lilygo_2CAN_330"
            artifact_name: "battery-emulator-lilygo-t-2can"
            release_label: "LilygoT-2CAN"
          - board_name: "ESP32 DevKit V1"
            pio_env: "esp32devkit_330"
            artifact_name: "battery-emulator-esp32devkit"
            release_label: "ESP32DevKitV1"
          - board_name: "BECom"
            pio_env: "BECom_330"
            artifact_name: "battery-emulator-becom"
            release_label: "BECom_ES32S3"
          - board_name: "Waveshare ESP32S3RS485CAN"
            pio_env: "waveshare_330"
            artifact_name: "battery-emulator-waveshareRS485CAN"
            release_label: "WaveshareESP32S3RS485CAN"
          - board_name: "Compiler warning check"
            pio_env: "compiler_warning_check"
            artifact_name: "battery-dummy-check"

    steps:
    - uses: actions/checkout@v7
      name: Checkout code

    - name: Get platformio.ini hash
      id: platformio_ini_hash
      run: |
        PLATFORMIO_INI_HASH=$(md5sum platformio.ini | awk '{ print $1 }')
        echo "platformio_ini_hash=$PLATFORMIO_INI_HASH" >> $GITHUB_OUTPUT

    # Broader cache (just the download files)
    - uses: actions/cache@v6
      with:
        path: |
          ~/.cache/pip
          ~/.platformio/.cache
        key: ${{ runner.os }}-pio

    # Tighter cache (of platformio itself)
    - uses: actions/cache@v6
      with:
        path: |
          ~/.cache/pip
          ~/.platformio
        key: ${{ runner.os }}-pio-${{ steps.platformio_ini_hash.outputs.platformio_ini_hash }}

    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install PlatformIO Core
      run: pip install --upgrade platformio

    - name: Build image for ${{ matrix.board_name }}
      run: pio run -e ${{ matrix.pio_env }}

    - name: Capture size report for ${{ matrix.board_name }}
      if: matrix.pio_env != 'compiler_warning_check'
      run: |
        pio run -e ${{ matrix.pio_env }} -t checkprogsize 2>&1 | tee checkprogsize.txt
        cat checkprogsize.txt | python .github/scripts/parse_size.py \
          --pio-env "${{ matrix.pio_env }}" \
          --board-name "${{ matrix.board_name }}" \
          --sha "${{ github.event.pull_request.head.sha || github.sha }}" \
          --pio-system-info "$(pio system info --json-output)" \
          --platform-json "$(cat "$HOME"/.platformio/platforms/espressif32*/platform.json)"

    - name: Stage release artifacts for ${{ matrix.board_name }}
      if: matrix.release_label
      run: |
        mkdir -p dist
        cp "${{ matrix.pio_env }}.size.json" dist/
        BUILD=.pio/build/${{ matrix.pio_env }}
        SHA="${{ github.event.pull_request.head.sha || github.sha }}"
        cp "$BUILD/firmware.factory.bin" "dist/BE_${SHA}_${{ matrix.release_label }}.factory.bin"
        cp "$BUILD/firmware.bin"         "dist/BE_${SHA}_${{ matrix.release_label }}.ota.bin"

    - name: Upload artifact for ${{ matrix.board_name }}
      if: matrix.release_label
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/
        if-no-files-found: warn
